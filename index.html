<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M2 Masterplan</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 20px auto;
  padding: 15px;
}

h1 { text-align: center; }

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.header {
  padding: 15px;
  cursor: pointer;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}

.content {
  display: none;
  padding: 10px 15px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}

.left {
  display: flex;
  align-items: center;
}

input { margin-right: 10px; }

.hammers { font-size: 14px; }

.star {
  cursor: pointer;
  margin-left: 10px;
}

.progress {
  background: #ddd;
  height: 18px;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
}

.today {
  background: #fff8e1;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="container">

<h1>M2 Masterplan</h1>

<div id="progressText">0%</div>
<div class="progress"><div class="bar" id="bar"></div></div>

<div class="today">
<h3>📅 Heute lernen</h3>
<div id="todayList"></div>
</div>

<div id="app"></div>

</div>

<script>

const data = [
["Local Skills",[
["Freibad testen",2],["Hallenbad testen",1],["Kinderwanderweg testen",3],
["Fahrradtour planen",4],["Museum",2],["Outlet",1],["Zugausflug",3],
["Kartoffeln holen",2],["Hederquelle",2],["Dom besuchen",2]
]],

["Familienskills",[
["Urlaubsideen",3],["Kochideen",2],["Snackideen Kids",1],["Snackideen uns",1],
["Tagesausflug",4],["DVD schauen",1],["Buch vorlesen",2],["Nägel lackieren",1],
["Boden wischen",2],["Picknick",2],["Sozialkaufhaus",3]
]],

["Tillmannskills",[
["Fahrrad",2],["Zur Ruhe kommen",4],["Yoga",3],["Bücher finden",2],
["Ferdi treffen",2],["Tomatengruppe",2],["Shoppen",1],
["Gespräch klären",5],["Balkon morgens",2]
]]
];

// UI bauen
const app = document.getElementById("app");
let allCheckboxes = [];

data.forEach((cat,ci)=>{

  let card = document.createElement("div");
  card.className="card";

  let header = document.createElement("div");
  header.className="header";
  header.innerText = cat[0];

  let content = document.createElement("div");
  content.className="content";

  header.onclick = () => {
    content.style.display = content.style.display === "block" ? "none" : "block";
  };

  cat[1].forEach((item,ii)=>{

    let row = document.createElement("div");
    row.className="item";

    let left = document.createElement("div");
    left.className="left";

    let cb = document.createElement("input");
    cb.type="checkbox";

    let key = ci+"-"+ii;
    cb.checked = localStorage.getItem(key)==="true";

    cb.onchange = () => {
      localStorage.setItem(key,cb.checked);
      update();
    };

    allCheckboxes.push(cb);

    let star = document.createElement("span");
    star.innerText = "⭐";
    star.className="star";

    let todayKey = "today-"+key;
    if(localStorage.getItem(todayKey)==="true") star.style.opacity=1;
    else star.style.opacity=0.3;

    star.onclick = () => {
      let active = localStorage.getItem(todayKey)==="true";
      localStorage.setItem(todayKey,!active);
      star.style.opacity = !active ? 1 : 0.3;
      renderToday();
    };

    left.appendChild(cb);
    left.appendChild(document.createTextNode(item[0]));
    left.appendChild(star);

    let right = document.createElement("div");
    right.className="hammers";
    right.innerText = "🔨".repeat(item[1]);

    row.appendChild(left);
    row.appendChild(right);

    content.appendChild(row);

  });

  card.appendChild(header);
  card.appendChild(content);
  app.appendChild(card);
});

// Progress
function update(){
  let total = allCheckboxes.length;
  let checked = allCheckboxes.filter(c=>c.checked).length;
  let percent = Math.round((checked/total)*100);

  document.getElementById("bar").style.width=percent+"%";
  document.getElementById("progressText").innerText=percent+"% erledigt";
}
update();

// Heute Liste
function renderToday(){
  let todayDiv = document.getElementById("todayList");
  todayDiv.innerHTML="";

  data.forEach((cat,ci)=>{
    cat[1].forEach((item,ii)=>{
      let key = ci+"-"+ii;
      if(localStorage.getItem("today-"+key)==="true"){
        let div = document.createElement("div");
        div.innerText="• "+item[0];
        todayDiv.appendChild(div);
      }
    });
  });
}

renderToday();

</script>

</body>
</html>
