<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>M2 Masterplan</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f2f4f7;
  margin: 0;
}

.container {
  max-width: 700px;
  margin: 20px auto;
  padding: 15px;
}

h1 { text-align: center; }

.card {
  background: white;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

.header {
  padding: 15px;
  cursor: pointer;
  font-weight: bold;
  border-bottom: 1px solid #eee;
}

.content {
  display: none;
  padding: 10px 15px;
}

.item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
}

.left {
  display: flex;
  align-items: center;
}

input { margin-right: 10px; }

.hammers { font-size: 14px; }

.star {
  cursor: pointer;
  margin-left: 10px;
}

.progress {
  background: #ddd;
  height: 18px;
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 10px;
}

.bar {
  height: 100%;
  background: #4caf50;
  width: 0%;
}

.today {
  background: #fff8e1;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

</style>
</head>

<body>

<div class="container">

<h1>100 Tage Lernplan - postM2</h1>

<div id="progressText">0%</div>
<div class="progress"><div class="bar" id="bar"></div></div>

<div class="today">
<h3>📅 Heute lernen</h3>
<div id="todayList"></div>
</div>

<div id="app"></div>

</div>

<script>

const data = [
["Local Skillz",[
["In die Sälzer Lagune diven",1],["Von Baumhögger Kartoffeln holen",2],["Die Schwimmoper besuchen",3],
["1 Fahrradtour planen",1],["Ins Heinz-Nixdorf-Dorum gehen",2],["Einen neuen Kinderwanderweg testen",2],["1 Outlet besuchen",3],
["Den Dom besichtigen",1],["Das Tretbecken im Hederquellgebiet erkunden",1],["Einen Zugausflug mit den Kindern unternehmen",2]
]],

["Familienskillz",[
["Neue Snackideen für die Kids erproben",5],["Einen Tagesausflug organisieren",3],["DVD 'Es war einmal das Leben' besorgen",1],["Allen ein neues Buch vorlesen",2],
["Nägel lackieren",4],["Boden wischen mit Kindern",4],["Einen Picknickausflug vorbereiten",3],["Sand für Solawispielplatz besorgen",2],
["Urlaubsideen präsentieren",3],["Neue Snackideen für uns",2],["Retoure zu Ikea bringen",1]
]],

["Beziehungsskillz",[
["Vanessa zum Geburtstag Kuchen backen",5],["Ein Date tagsüber organisieren",4],["Einen außergewöhnlichen Abend zu Hause vorbereiten",3],["Vanessa auf Ring kontrollieren",1],
["Hochzeitsideen präsentieren",5],["Regeln für das Siedler Kartenspiel vorbereiten",2],["Baldurs Gate runterladen",1],["Vanessa auf Körperhaltung hinweisen",1],
["Eine Inlinertour planen",1],["Private Muttertagsmassage",3]
]],

["Tillmannskillz",[
["Ein neues Fahrrad besorgen",4],["Athletic Yoga testen",2],["Herausfinden, welches dein liebstes Buchgenre ist",4],["Ferdi treffen",2],
["Die Tomatengruppe supporten",1],["Morgens frische Luft auf dem Balkon schnappen",1],["Jacken (aus)sortieren",3],
["Wasserskifahrt organisieren",5],["Zaheinsde hören",4]
]],

["Handstandskillz",[
["",4],["",2],["",4],["",2],
["",1],["",1],["",3],
["",5],["",4]
]],

["Backskillz",[
["Möhren vorbereiten: schälen und reiben",2],["Zucker und Öl bereitstellen",1],["Levke beauftragen, Eier aufzuschlagen",2],["Jasper 1 TL Zimt in die silberne Schüssel streuen lassen",4],
["Du rührst (Schneebesen), Kinder schütten rein",4],["Restliche Zutaten abwiegen",1],["Mehl und Backpulver vermischen",1],["Du rührst, Kinder löffeln rein",5],
["Umfüllen und glatt streichen (mit Teigschaber, ggf leicht anfeuchten)",2],["Schieb in den Ofen rein",1]
]],

["Renovierungsskillz",[
["Vorschläge zur Beleuchtung der Spielecke machen",5],["Bett für Jasper organisieren",2],["Gewürzregal bestellen und anbringen",2],["Leselampe fürs Sofa bestellen",2],
["Aufbewahrungskisten für die Küche organisieren",3],["Flurwände renovieren",2],["Deko in Levkes Zimmer anbringen",4],
["Wintersachen verstauen",1],["Sonnenschutz für die Schlafzimmer überlegen",3],["Balkon einrichten",3]
]],

["Daddyskillz",[
["Sommerschuhe für Jasper organisieren",2],["Gartenequipment für die Kinder organisieren",2],["Gartenequipment für die Erwachsenen überlegen",4],["Ein Playdate planen und umsetzen",4],
["Neue Hobbies für die Kinder testen",3],["Levke schwimmen beibringen",4],["Mit Jasper draußen pinkeln üben",3],
["1 Bastelprojekt mit den Kindern",5],["Kresse anpflanzen",3],["Ein Dekoprojekt mit den Kindern überlegen",3]
]],

["Kochskillz",[
["Etwas Indisches zubereiten (mit Naan)",4],["Einen Fancy Salat schnippeln",2],["Etwas israelisches kochen",4],["Einen Auflauf backen",2],
["Fladenbrot backen",4],["Etwa neues veganes ausprobieren",1],["Apfelkuchen backen",3],
["Spinatsmoothie machen",1],["Marmelade kochen",5],["Grillen",1]
]],

["Sportskillz",[
["5 km joggen",2],["10 breite Klimmzüge",4],["2 min Plank",3],["3x10 Romanian Deadlift mit 40 kg",2],
["30 min Rudern",1],["3x10 Bankdrücken mit 40 kg",1],["Mady im Reisfeld Yoga",2],
["3x10 Burpees",3],["p",4],["z",4]
]]

  
];

// UI bauen
const app = document.getElementById("app");
let allCheckboxes = [];

data.forEach((cat,ci)=>{

  let card = document.createElement("div");
  card.className="card";

  let header = document.createElement("div");
  header.className="header";
  header.innerText = cat[0];

  let content = document.createElement("div");
  content.className="content";

  header.onclick = () => {
    content.style.display = content.style.display === "block" ? "none" : "block";
  };

  cat[1].forEach((item,ii)=>{

    let row = document.createElement("div");
    row.className="item";

    let left = document.createElement("div");
    left.className="left";

    let cb = document.createElement("input");
    cb.type="checkbox";

    let key = ci+"-"+ii;
    cb.checked = localStorage.getItem(key)==="true";

    cb.onchange = () => {
      localStorage.setItem(key,cb.checked);
      update();
    };

    allCheckboxes.push(cb);

    let star = document.createElement("span");
    star.innerText = "⭐";
    star.className="star";

    let todayKey = "today-"+key;
    if(localStorage.getItem(todayKey)==="true") star.style.opacity=1;
    else star.style.opacity=0.3;

    star.onclick = () => {
      let active = localStorage.getItem(todayKey)==="true";
      localStorage.setItem(todayKey,!active);
      star.style.opacity = !active ? 1 : 0.3;
      renderToday();
    };

    left.appendChild(cb);
    left.appendChild(document.createTextNode(item[0]));
    left.appendChild(star);

    let right = document.createElement("div");
    right.className="hammers";
    right.innerText = "🔨".repeat(item[1]);

    row.appendChild(left);
    row.appendChild(right);

    content.appendChild(row);

  });

  card.appendChild(header);
  card.appendChild(content);
  app.appendChild(card);
});

// Progress
function update(){
  let total = allCheckboxes.length;
  let checked = allCheckboxes.filter(c=>c.checked).length;
  let percent = Math.round((checked/total)*100);

  document.getElementById("bar").style.width=percent+"%";
  document.getElementById("progressText").innerText=percent+"% erledigt";
}
update();

// Heute Liste
function renderToday(){
  let todayDiv = document.getElementById("todayList");
  todayDiv.innerHTML="";

  data.forEach((cat,ci)=>{
    cat[1].forEach((item,ii)=>{
      let key = ci+"-"+ii;
      if(localStorage.getItem("today-"+key)==="true"){
        let div = document.createElement("div");
        div.innerText="• "+item[0];
        todayDiv.appendChild(div);
      }
    });
  });
}

renderToday();

</script>

</body>
</html>
